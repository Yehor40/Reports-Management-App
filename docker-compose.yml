version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: report-db
    environment:
      POSTGRES_DB: bp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Qwerty123
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: report-app
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/bp
      - DB_USERNAME=postgres
      - DB_PASSWORD=Qwerty123
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/bp
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Qwerty123
    depends_on:
      - db

volumes:
  pgdata:
